<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Curso de Globoflexia</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #ffe066, #ff6b6b);
      color: #1f2937;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 20px;
    }

    .hero {
      background: white;
      border-radius: 20px;
      padding: 24px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      margin-bottom: 20px;
      text-align: center;
    }

    .logo {
      width: 120px;
      margin-bottom: 10px;
    }

    .hero h1 {
      margin: 0;
      font-size: 32px;
      color: #ff6b6b;
    }

    .hero p {
      color: #555;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 2fr;
      gap: 20px;
      margin-bottom: 20px;
    }

    .card {
      background: white;
      border-radius: 20px;
      padding: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    }

    .card h2 {
      color: #ff6b6b;
    }

    .progress-bar {
      width: 100%;
      height: 14px;
      background: #eee;
      border-radius: 999px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #00c9ff, #92fe9d);
    }

    input {
      width: 100%;
      padding: 10px;
      border-radius: 10px;
      border: 1px solid #ccc;
      margin-bottom: 10px;
    }

    button {
      background: #ff6b6b;
      color: white;
      border: none;
      padding: 10px 14px;
      border-radius: 10px;
      cursor: pointer;
    }

    button:hover {
      background: #ff3b3b;
    }

    .secondary {
      background: #00c9ff;
    }

    .video-frame {
      width: 100%;
      aspect-ratio: 16 / 9;
      border-radius: 16px;
      border: none;
      margin-bottom: 10px;
    }

    .video-item {
      border: 1px solid #eee;
      padding: 10px;
      border-radius: 12px;
      margin-bottom: 10px;
    }

    @media (max-width: 900px) {
      .grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <div class="container">

    <div class="hero">
      <img src="logo.png" class="logo" alt="Logo Tan Barbudo">
      <h1>Globoflexia con Tan Barbudo 🎈</h1>
      <p>Aprende paso a paso y diviértete creando figuras increíbles</p>

      <iframe class="video-frame"
        src="https://www.youtube.com/embed/eaYm1U4eEAM"
        allowfullscreen>
      </iframe>
    </div>

    <div class="grid">
      <div class="card">
        <h2>Alumno</h2>
        <input type="text" id="studentName" placeholder="Tu nombre">
        <button onclick="saveStudentName()">Guardar</button>

        <h2>Progreso</h2>
        <p id="progressText"></p>
        <div class="progress-bar">
          <div class="progress-fill" id="progressFill"></div>
        </div>
      </div>

      <div class="card">
        <h2>Video</h2>
        <iframe id="videoFrame" class="video-frame"></iframe>
        <h3 id="videoTitle"></h3>
        <p id="videoDescription"></p>
        <button onclick="markAsWatched()">Marcar como visto</button>
      </div>
    </div>

    <div class="card">
      <h2>Videos</h2>
      <div id="videoList"></div>
    </div>

  </div>

<script>

    },
    {

    {

    },
    {

    {

      description: 'Aprende a hacer un racimo de uvas con globos, perfecto para decoraciones creativas.',
      watched: false
    }
  ]
};

let selectedVideoId = null;

function loadData(){
  const saved = localStorage.getItem(STORAGE_KEY);
  if(saved){ data = JSON.parse(saved); }
  renderVideos(); updateProgress();
}

function saveData(){
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}

function saveStudentName(){
  data.studentName = document.getElementById('studentName').value;
  saveData();
}

function renderVideos(){
  const list = document.getElementById('videoList');
  list.innerHTML='';

  data.videos.forEach(v=>{
    const div = document.createElement('div');
    div.className='video-item';
    div.innerHTML=`
      <strong>${v.title}</strong><br>
      ${v.description}<br>
      <button onclick="selectVideo(${v.id})">Ver</button>
    `;
    list.appendChild(div);
  });
}

function selectVideo(id){
  const v = data.videos.find(x=>x.id===id);
  selectedVideoId=id;
  videoFrame.src=v.url;
  videoTitle.textContent=v.title;
  videoDescription.textContent=v.description;
}

function markAsWatched(){
  const v = data.videos.find(x=>x.id===selectedVideoId);
  if(v){ v.watched=true; saveData(); updateProgress(); }
}

function updateProgress(){
  const total=data.videos.length;
  const seen=data.videos.filter(v=>v.watched).length;
  const percent= total? (seen/total)*100:0;

  progressText.textContent=`${seen} de ${total} vistos`;
  progressFill.style.width=percent+"%";
}

loadData();
</script>
</body>
</html>
